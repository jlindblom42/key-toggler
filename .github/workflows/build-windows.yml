name: Build Windows Executable

on:
  push:
    branches:
      - main
      - release
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Increment version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content VERSION -Raw).Trim()
          if ($version -notmatch '^(\d+)\.(\d+)\.(\d+)$') {
            throw "VERSION must follow semantic versioning (MAJOR.MINOR.PATCH)."
          }

          $major = [int]$Matches[1]
          $minor = [int]$Matches[2]
          $patch = [int]$Matches[3]

          if ("${{ github.ref_name }}" -eq "release") {
            $minor += 1
            $patch = 0
          } else {
            $patch += 1
          }

          $newVersion = "$major.$minor.$patch"
          Set-Content -Path VERSION -Value $newVersion

          "version=$newVersion" >> $env:GITHUB_OUTPUT
          "tag=v$newVersion" >> $env:GITHUB_OUTPUT

      - name: Commit and push version bump
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}" || echo "No version changes to commit"
          git push

      - name: Configure CMake
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: key-toggler-windows-exe-${{ steps.version.outputs.version }}
          path: build/Release/key_toggler.exe
          if-no-files-found: error

      - name: Create GitHub release and upload executable
        if: github.ref_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: build/Release/key_toggler.exe
